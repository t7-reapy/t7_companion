# Cuts a GitHub Release via GoReleaser when a v* tag is pushed: builds the
# pure-Go binaries (Windows + Linux), bundles the embedding model, and generates
# the changelog from conventional commits. See .goreleaser.yaml.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff tags

      - name: Verify plugin manifest version matches the release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(jq -r .version plugin/.claude-plugin/plugin.json)"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::plugin.json version ($manifest) does not match release tag ($tag). Bump plugin/.claude-plugin/plugin.json's version to $tag before tagging." >&2
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
